version: "2.4"
services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672" # Default RabbitMQ port
      - "15672:15672" # Management Plugin port
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - ./rabbitmq/data:/var/lib/rabbitmq # Persist RabbitMQ data
      - ./rabbitmq/logs:/var/log/rabbitmq # Persist RabbitMQ logs
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: always
    networks:
      - aquaalert_network
  aquaalertapi:
    #image: aquaalertapi-image
    image: emmanueljomer/aquaalertapi:latest
    container_name: aquaalertapi
    #build:
    #  context: .
    # dockerfile: Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
    volumes:
      - ./logs:/logs
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: always
    networks:
      - aquaalert_network
networks:
  aquaalert_network:
    driver: bridge
